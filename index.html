.close-btn { cursor: pointer; font-size: 18px; color: #666; line-height: 1; }
.close-btn:hover { color: #333; }
button { cursor: pointer; padding: 6px 10px; border: none; border-radius: 4px; font-size: 11px; font-weight: bold; }
.btn-primary { background: #00695C; color: white; width: 100%; margin-top: 6px; }
.btn-primary:hover { background: #004D40; }
.btn-danger { background: #e53935; color: white; width: 100%; margin-top: 6px; }
input, select { width: 100%; padding: 5px 6px; border: 1px solid #ddd; border-radius: 3px; margin-bottom: 6px; font-size: 11px; }
label { display: block; font-size: 10px; color: #666; margin: 5px 0 2px; font-weight: bold; }
.info-box { background: #e8f5e9; padding: 6px 8px; border-radius: 4px; margin-bottom: 8px; font-size: 10px; }
.add-btn { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: #00695C; color: white; font-size: 22px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; z-index: 99; }
.add-btn:hover { background: #004D40; transform: scale(1.1); }
</style>
</head>
<body>
<div class="header"><h1>📊 施工甘特圖 - ${nameEscaped}</h1></div>
<div class="chart-area">
    <div class="container" id="chart"></div>
    <div class="container milestone-section" id="milestones"></div>
</div>
<div class="edit-panel" id="editPanel">
<div class="panel-header">
<span class="panel-title" id="panelTitle">編輯項目</span>
<span class="close-btn" onclick="closePanel()">✕</span>
</div>
<div id="panelBody"></div>
</div>
<button class="add-btn" onclick="showAddForm()" title="新增甘特圖項目">＋</button>
<script>
const items = ${itemsJson};
const segments = ${segmentsJson};
const pipeline = ${pipelineJson};
let milestones = ${milestonesJson};
const API_URL = '${apiUrl}';
let editingItem = null;

// 確保 methodData 是物件而不是字串
milestones = milestones.map(m => {
    if (typeof m.methodData === 'string') {
        try {
            m.methodData = JSON.parse(m.methodData);
        } catch(e) {
            console.error('解析 methodData 失敗:', e);
            m.methodData = {};
        }
    }
    return m;
});

function getItemProgress(item) {
    const label = item.label || '';
    const segMatch = label.match(/段落(\\d+)/);
    const rangeMatch = label.match(/#(\\d+)～#(\\d+)/);
    if (!segMatch) return null;
    const seg = segments.find(s => String(s.segmentNumber) === segMatch[1]);
    if (!seg) return null;
    const arr = (seg.smallSegments || '').split(',').map(s => s.trim());
    const segLen = seg.endDistance - seg.startDistance;
    const numSmall = Math.ceil(segLen / 10);
    const from = rangeMatch ? parseInt(rangeMatch[1]) - 1 : 0;
    const to = rangeMatch ? parseInt(rangeMatch[2]) - 1 : numSmall - 1;
    let done = 0, total = 0;
    for (let i = from; i <= to; i++) {
        const smallLen = Math.min(10, segLen - i * 10);
        total += smallLen;
        if (arr[i] === '1') done += smallLen;
    }
    return { done: Math.round(done), total: Math.round(total), rate: total > 0 ? done / total : 0 };
}

function renderChart() {
    if (!items || items.length === 0) {
        document.getElementById('chart').innerHTML = '<div style="text-align:center;padding:60px;color:#999;">📋 尚無甘特圖項目</div>';
        return;
    }
    
    const today = new Date();
    const dates = items.flatMap(item => [new Date(item.startDate), new Date(item.endDate)]);
    let minDate = new Date(Math.min(...dates));
    let maxDate = new Date(Math.max(...dates));
    minDate.setDate(minDate.getDate() - 7);
    maxDate.setDate(maxDate.getDate() + 7);
    
    // 日期軸：先畫年份背景色塊，再畫日期刻度
    let html = '<div style="display:flex;margin-bottom:6px;"><div style="width:240px;"></div><div style="flex:1;position:relative;height:28px;padding-right:80px;border-bottom:1px solid #ddd;">';
    
    // 第一步：繪製年份背景色塊和標籤
    const yearColors = {
        2025: 'rgba(56, 142, 60, 0.1)',   // 綠色（過去）
        2026: 'rgba(25, 118, 210, 0.1)',  // 藍色（當前）
        2027: 'rgba(229, 57, 53, 0.1)',   // 紅色（未來）
        2028: 'rgba(255, 152, 0, 0.1)'    // 橘色（更未來）
    };
    const yearTextColors = {
        2025: '#388e3c',
        2026: '#1976d2',
        2027: '#e53935',
        2028: '#ff9800'
    };
    
    let currentDate = new Date(minDate);
    let yearSegments = [];
    
    // 計算每個年份的起始和結束位置
    while (currentDate <= maxDate) {
        const year = currentDate.getFullYear();
        const yearStart = new Date(Math.max(currentDate.getTime(), minDate.getTime()));
        const yearEnd = new Date(Math.min(new Date(year, 11, 31).getTime(), maxDate.getTime()));
        
        const startPct = ((yearStart - minDate) / (maxDate - minDate)) * 100;
        const endPct = ((yearEnd - minDate) / (maxDate - minDate)) * 100;
        const widthPct = endPct - startPct;
        
        if (widthPct > 0) {
            yearSegments.push({ year, startPct, widthPct });
        }
        
        currentDate = new Date(year + 1, 0, 1);
    }
    
    // 繪製年份背景和標籤
    yearSegments.forEach(seg => {
        const bgColor = yearColors[seg.year] || 'rgba(158, 158, 158, 0.1)';
        const textColor = yearTextColors[seg.year] || '#9e9e9e';
        html += '<div style="position:absolute;left:' + seg.startPct + '%;width:' + seg.widthPct + '%;height:12px;background:' + bgColor + ';border-right:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;color:' + textColor + ';">' + seg.year + '</div>';
    });
    
    // 第二步：繪製日期刻度（在年份下方）
    html += '<div style="position:absolute;top:12px;left:0;right:0;height:16px;">';
    const cur = new Date(minDate);
    while (cur <= maxDate) {
        const pct = ((cur - minDate) / (maxDate - minDate)) * 100;
        const month = cur.getMonth() + 1;
        const day = cur.getDate();
        html += '<div style="position:absolute;left:' + pct + '%;transform:translateX(-50%);font-size:8px;color:#666;">' + month + '/' + day + '</div>';
        cur.setDate(cur.getDate() + 21);
    }
    html += '</div>';
    
    html += '</div></div>';
    
    const todayPct = ((today - minDate) / (maxDate - minDate)) * 100;
    
    items.forEach((item, idx) => {
        const start = new Date(item.startDate);
        const end = new Date(item.endDate);
        const left = ((start - minDate) / (maxDate - minDate)) * 100;
        const width = ((end - start) / (maxDate - minDate)) * 100;
        const days = Math.round((end - start) / 86400000);
        
        const prog = getItemProgress(item);
        const progLabel = prog ? prog.done + 'm/' + prog.total + 'm' : '';
        const rate = prog ? prog.rate : 0;
        
        // 根據施工方式決定顏色
        const label = item.label || '';
        let baseColor = '#9e9e9e'; // 預設灰色
        if (label.includes('埋設')) baseColor = '#e53935'; // 紅色
        else if (label.includes('推進')) baseColor = '#1976d2'; // 藍色
        else if (label.includes('水管橋')) baseColor = '#388e3c'; // 綠色
        
        // 根據完成度決定透明度
        let opacity = 0.3;
        if (rate > 0 && rate < 1) opacity = 0.6;
        else if (rate >= 1) opacity = 1.0;
        
        const barColor = baseColor;
        const barStyle = 'background:' + barColor + ';opacity:' + opacity + ';';
        
        html += '<div class="gantt-row" onclick="editItem(' + idx + ')">';
        html += '<div class="gantt-label" title="' + item.label + '">' + item.label + '</div>';
        html += '<div class="gantt-timeline-container"><div class="gantt-timeline">';
        
        // Bar 分為兩部分：已完成（實心）+ 未完成（半透明）
        const barWidth = Math.max(width, 0.5);
        const doneWidth = barWidth * rate;  // 已完成的寬度比例
        const undoneWidth = barWidth - doneWidth;  // 未完成的寬度比例
        
        // 已完成部分（實心）
        if (doneWidth > 0) {
            html += '<div class="gantt-bar" style="left:' + left + '%;width:' + doneWidth + '%;background:' + baseColor + ';opacity:1;" title="已完成:' + Math.round(rate*100) + '%"></div>';
        }
        
        // 未完成部分（半透明）
        if (undoneWidth > 0) {
            html += '<div class="gantt-bar" style="left:' + (left + doneWidth) + '%;width:' + undoneWidth + '%;background:' + baseColor + ';opacity:0.3;" title="未完成:' + Math.round((1-rate)*100) + '%"></div>';
        }
        
        // 天數標籤（放在中間）
        html += '<div style="position:absolute;left:' + left + '%;width:' + barWidth + '%;height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;color:white;font-weight:bold;pointer-events:none;z-index:5;">' + days + '天</div>';
        
        if (progLabel) html += '<div class="gantt-progress" style="left:' + (left + barWidth) + '%;padding-right:5px;">' + progLabel + '</div>';
        html += '<div class="gantt-today" style="left:' + todayPct + '%;"></div>';
        html += '</div></div></div>';
    });
    
    document.getElementById('chart').innerHTML = html;
}

function editItem(idx) {
    const item = items[idx];
    editingItem = item;
    const prog = getItemProgress(item);
    const segMatch = item.label.match(/段落(\\d+)/);
    const rangeMatch = item.label.match(/#(\\d+)～#(\\d+)/);
    let html = '';
    if (prog) html += '<div class="info-box">📊 ' + prog.done + 'm/' + prog.total + 'm (' + Math.round(prog.rate*100) + '%)</div>';
    html += '<label>段落</label><select id="segSelect" onchange="handleSegChange()"><option value="">手動輸入</option>';
    segments.forEach(seg => {
        const numSmall = Math.ceil((seg.endDistance - seg.startDistance) / 10);
        const label = [seg.diameter, seg.pipeType, seg.method].filter(Boolean).join(' ') + ' - 段落' + seg.segmentNumber;
        const sel = segMatch && segMatch[1] === String(seg.segmentNumber) ? ' selected' : '';
        html += '<option value="' + seg.segmentNumber + '" data-num="' + numSmall + '"' + sel + '>' + label + '</option>';
    });
    html += '</select><div id="rangeBox" style="display:none;"><label>小段範圍</label><div style="display:flex;gap:4px;"><select id="smallFrom" style="flex:1;" onchange="updateLabel()"></select><select id="smallTo" style="flex:1;" onchange="updateLabel()"></select></div></div>';
    html += '<label>項目名稱</label><input id="itemLabel" value="' + (item.label || '') + '">';
    html += '<label>開始日期</label><input id="startDate" type="date" value="' + (item.startDate || '') + '">';
    html += '<label>完成日期</label><input id="endDate" type="date" value="' + (item.endDate || '') + '">';
    html += '<label>備註</label><input id="notes" value="' + (item.notes || '') + '">';
    html += '<button class="btn-primary" onclick="saveItem()">💾 儲存</button><button class="btn-danger" onclick="deleteItem()">🗑️ 刪除</button>';
    document.getElementById('panelTitle').textContent = '✏️ 編輯項目';
    document.getElementById('panelBody').innerHTML = html;
    document.getElementById('editPanel').classList.add('show');
    if (segMatch) {
        setTimeout(() => {
            handleSegChange();
            if (rangeMatch) {
                document.getElementById('smallFrom').value = rangeMatch[1];
                document.getElementById('smallTo').value = rangeMatch[2];
            }
        }, 50);
    }
}

function showAddForm() {
    editingItem = null;
    let html = '<label>段落</label><select id="segSelect" onchange="handleSegChange()"><option value="">手動輸入</option>';
    segments.forEach(seg => {
        const numSmall = Math.ceil((seg.endDistance - seg.startDistance) / 10);
        const label = [seg.diameter, seg.pipeType, seg.method].filter(Boolean).join(' ') + ' - 段落' + seg.segmentNumber;
        html += '<option value="' + seg.segmentNumber + '" data-num="' + numSmall + '">' + label + '</option>';
    });
    html += '</select><div id="rangeBox" style="display:none;"><label>小段範圍</label><div style="display:flex;gap:4px;"><select id="smallFrom" style="flex:1;" onchange="updateLabel()"></select><select id="smallTo" style="flex:1;" onchange="updateLabel()"></select></div></div>';
    html += '<label>項目名稱</label><input id="itemLabel">';
    html += '<label>開始日期</label><input id="startDate" type="date">';
    html += '<label>完成日期</label><input id="endDate" type="date">';
    html += '<label>備註</label><input id="notes">';
    html += '<button class="btn-primary" onclick="saveItem()">💾 新增</button>';
    document.getElementById('panelTitle').textContent = '＋ 新增項目';
    document.getElementById('panelBody').innerHTML = html;
    document.getElementById('editPanel').classList.add('show');
}

function closePanel() { document.getElementById('editPanel').classList.remove('show'); }

function handleSegChange() {
    const sel = document.getElementById('segSelect');
    const opt = sel.options[sel.selectedIndex];
    if (!opt.value) { document.getElementById('rangeBox').style.display = 'none'; return; }
    const numSmall = parseInt(opt.dataset.num || 1);
    const fromSel = document.getElementById('smallFrom');
    const toSel = document.getElementById('smallTo');
    let opts = '';
    for (let i = 0; i < numSmall; i++) opts += '<option value="' + (i+1) + '">#' + (i+1) + '</option>';
    fromSel.innerHTML = opts;
    toSel.innerHTML = opts;
    toSel.value = numSmall;
    document.getElementById('rangeBox').style.display = 'block';
    updateLabel();
}

function updateLabel() {
    const sel = document.getElementById('segSelect');
    const opt = sel ? sel.options[sel.selectedIndex] : null;
    if (!opt || !opt.value) return;
    const seg = segments.find(s => String(s.segmentNumber) === opt.value);
    if (!seg) return;
    const from = document.getElementById('smallFrom').value;
    const to = document.getElementById('smallTo').value;
    const prefix = [seg.diameter, seg.pipeType, seg.method].filter(Boolean).join(' ');
    document.getElementById('itemLabel').value = prefix + ' - 段落' + seg.segmentNumber + ' #' + from + '～#' + to;
}

async function saveItem() {
    const label = document.getElementById('itemLabel').value;
    const startDate = document.getElementById('startDate').value;
    const endDate = document.getElementById('endDate').value;
    const notes = document.getElementById('notes').value;
    if (!label || !startDate || !endDate) { alert('請填寫完整資訊'); return; }
    const action = editingItem ? 'updateGanttItem' : 'addGanttItem';
    const params = new URLSearchParams({ action, pipelineId: pipeline.id, label, startDate, endDate, status: '', notes });
    if (editingItem) params.append('itemId', editingItem.id);
    try {
        const res = await fetch(API_URL + '?' + params.toString());
        const result = await res.json();
        if (result.success) { 
            alert('儲存成功!'); 
            // 使用 postMessage 通知主頁面
            if (window.opener) {
                window.opener.postMessage({ type: 'ganttChanged' }, '*');
            }
            window.close(); 
        }
        else { alert('失敗: ' + (result.error || '未知錯誤')); }
    } catch(e) { alert('失敗: ' + e.message); }
}

async function deleteItem() {
    if (!editingItem || !confirm('確定刪除?')) return;
    try {
        const res = await fetch(API_URL + '?action=deleteGanttItem&itemId=' + editingItem.id);
        const result = await res.json();
        if (result.success) { 
            alert('刪除成功!'); 
            // 使用 postMessage 通知主頁面
            if (window.opener) {
                window.opener.postMessage({ type: 'ganttChanged' }, '*');
            }
            window.close(); 
        }
        else { alert('失敗: ' + (result.error || '未知錯誤')); }
    } catch(e) { alert('失敗: ' + e.message); }
}

// 渲染里程碑區域
function renderMilestones() {
    const container = document.getElementById('milestones');
    if (!container || !milestones || milestones.length === 0) {
        if (container) container.style.display = 'none';
        return;
    }
    
    // 使用與甘特圖相同的時間範圍（不包含里程碑日期）
    const dates = items.flatMap(item => [new Date(item.startDate), new Date(item.endDate)]);
    let minDate = new Date(Math.min(...dates));
    let maxDate = new Date(Math.max(...dates));
    minDate.setDate(minDate.getDate() - 7);
    maxDate.setDate(maxDate.getDate() + 7);
    
    // 過濾出在時間範圍內的里程碑
    const visibleMilestones = milestones.filter(m => {
        const mDate = new Date(m.endDate);
        return mDate >= minDate && mDate <= maxDate;
    });
    
    if (visibleMilestones.length === 0) {
        container.style.display = 'none';
        return;
    }
    
    // 計算各施工方式的實際完工長度
    function getActualLength() {
        const actual = {};
        segments.forEach(seg => {
            const method = seg.method || '';
            if (!method) return;
            if (!actual[method]) actual[method] = 0;
            const start = Number(seg.startDistance);
            const end = Number(seg.endDistance);
            const numSmall = Math.ceil((end - start) / 10);
            const statusArr = (seg.smallSegments || '').split(',').map(s => s.trim());
            for (let i = 0; i < numSmall; i++) {
                if (statusArr[i] === '1') {
                    actual[method] += Math.min(start + (i+1)*10, end) - (start + i*10);
                }
            }
        });
        return actual;
    }
    
    // 計算各施工方式的預定長度（從甘特圖項目累加，含進行中項目的比例）
    function getPlannedLength(milestone) {
        const planned = {};
        const milestoneDate = new Date(milestone.endDate);
        
        items.forEach(item => {
            const itemStart = new Date(item.startDate);
            const itemEnd = new Date(item.endDate);
            
            // 如果里程碑日期在項目開始前，不計算
            if (milestoneDate < itemStart) return;
            
            const label = item.label || '';
            const segMatch = label.match(/段落(\\d+)/);
            const rangeMatch = label.match(/#(\\d+)～?~?#(\\d+)/);
            
            if (segMatch && rangeMatch) {
                const segNum = parseInt(segMatch[1]);
                const seg = segments.find(s => s.segmentNumber === segNum);
                if (seg) {
                    const method = seg.method || '';
                    if (!method) return;
                    if (!planned[method]) planned[method] = 0;
                    
                    const from = parseInt(rangeMatch[1]) - 1;
                    const to = parseInt(rangeMatch[2]) - 1;
                    const start = Number(seg.startDistance);
                    const end = Number(seg.endDistance);
                    const segLen = end - start;
                    const numSmall = Math.ceil(segLen / 10);
                    
                    // 計算此項目的總長度
                    let totalLength = 0;
                    for (let i = from; i <= to && i < numSmall; i++) {
                        const smallStart = start + i * 10;
                        const smallEnd = Math.min(start + (i + 1) * 10, end);
                        totalLength += smallEnd - smallStart;
                    }
                    
                    // 判斷項目狀態並計算應完成長度
                    if (milestoneDate >= itemEnd) {
                        // 里程碑在項目結束後：100% 完成
                        planned[method] += totalLength;
                    } else {
                        // 里程碑在項目進行中：按時間比例計算
                        const totalDays = (itemEnd - itemStart) / (1000 * 60 * 60 * 24);
                        const elapsedDays = (milestoneDate - itemStart) / (1000 * 60 * 60 * 24);
                        const progressRatio = elapsedDays / totalDays;
                        planned[method] += totalLength * progressRatio;
                    }
                }
            }
        });
        
        return planned;
    }
    
    const actualLength = getActualLength();
    const methods = ['埋設', '推進', '水管橋', '潛鑽', '潛遁', '隧道'];
    const methodColors = {
        '埋設': '#e53935',
        '推進': '#1976d2',
        '水管橋': '#388e3c',
        '潛鑽': '#f57c00',
        '潛遁': '#7b1fa2',
        '隧道': '#ff5722'
    };
    
    // 建立里程碑時間軸容器（簡化版）
    let html = '<div style="display:flex;margin-top:20px;border-top:1px solid #ddd;padding-top:10px;">';
    html += '<div style="width:240px;font-size:11px;font-weight:bold;color:#3f51b5;padding:8px;">🎯 里程碑</div>';
    html += '<div style="flex:1;position:relative;height:60px;padding-right:80px;">';
    
    const totalRange = maxDate.getTime() - minDate.getTime();
    
    visibleMilestones.forEach((milestone, idx) => {
        const plannedLength = getPlannedLength(milestone);
        const milestoneDate = new Date(milestone.endDate);
        const dateStr = milestoneDate.toLocaleDateString('zh-TW');
        
        // 計算里程碑在時間軸上的位置（使用毫秒數計算）
        const milestoneOffset = milestoneDate.getTime() - minDate.getTime();
        const milestonePct = (milestoneOffset / totalRange) * 100;
        
        // 建立 tooltip 內容（橫向簡化版）
        let tooltipHtml = '<div style="min-width:300px;max-width:500px;">';
        tooltipHtml += '<div style="font-weight:bold;margin-bottom:10px;color:#3f51b5;border-bottom:2px solid #ddd;padding-bottom:6px;font-size:12px;">' + dateStr + '</div>';
        
        const hasData = methods.some(method => {
            // 嘗試直接用 method，如果找不到就嘗試找包含 method 的 key
            let target = 0;
            if (milestone.methodData) {
                if (milestone.methodData[method]) {
                    target = Math.round(Number(milestone.methodData[method]));
                } else {
                    // 尋找包含此施工方式的 key（例如 "2200 DIP 埋設"）
                    const foundKey = Object.keys(milestone.methodData).find(k => k.includes(method));
                    if (foundKey) {
                        target = Math.round(Number(milestone.methodData[foundKey]));
                    }
                }
            }
            const planned = Math.round(plannedLength[method] || 0);
            const actual = Math.round(actualLength[method] || 0);
            return target > 0 || planned > 0 || actual > 0;
        });
        
        if (hasData) {
            methods.forEach(method => {
                // 嘗試直接用 method，如果找不到就嘗試找包含 method 的 key
                let target = 0;
                if (milestone.methodData) {
                    if (milestone.methodData[method]) {
                        target = Math.round(Number(milestone.methodData[method]));
                    } else {
                        // 尋找包含此施工方式的 key（例如 "2200 DIP 埋設"）
                        const foundKey = Object.keys(milestone.methodData).find(k => k.includes(method));
                        if (foundKey) {
                            target = Math.round(Number(milestone.methodData[foundKey]));
                        }
                    }
                }
                const planned = Math.round(plannedLength[method] || 0);
                const actual = Math.round(actualLength[method] || 0);

                const start = Number(seg.startDistance);
                const end = Number(seg.endDistance);
                const numSmall = Math.ceil((end - start) / 10);
                const statusArr = (seg.smallSegments || '').split(',').map(s => s.trim());
                for (let i = 0; i < numSmall; i++) {
                    if (statusArr[i] === '1') {
                        actual[method] += Math.min(start + (i+1)*10, end) - (start + i*10);
                    }
                }
            });
            return actual;
        }

        function showStatsPanel() {
            const existingPanel = document.querySelector('.stats-panel');
            if (existingPanel) existingPanel.remove();
            
            // 計算各段落和工法的進度
            let totalLength = 0;
            let completedLength = 0;
            const methodStats = {}; // {工法: {total: 長度, completed: 完工長度}}
            
            currentPipeline.segments.forEach(segment => {
                const segLength = segment.endDistance - segment.startDistance;
                const smallSegmentsStatus = segment.smallSegments || '';
                const statusArray = smallSegmentsStatus.split(',').map(s => s.trim());
                const numSmallSegments = Math.ceil(segLength / 10);
                
                let segCompleted = 0;
                for (let i = 0; i < numSmallSegments; i++) {
                    const smallLength = Math.min(10, segLength - (i * 10));
                    totalLength += smallLength;
                    
                    if (statusArray[i] === '1') {
                        completedLength += smallLength;
                        segCompleted += smallLength;
                    }
                }
                
                // 統計各工法（含管徑、管種）
                const method = segment.method || '未設定';
                const diameter = segment.diameter || '';
                const pipeType = segment.pipeType || '';
                const methodKey = method;
                const methodLabel = [diameter, pipeType, method].filter(Boolean).join(' ');
                if (!methodStats[methodKey]) {
                    methodStats[methodKey] = { total: 0, completed: 0, label: methodLabel };
                }
                methodStats[methodKey].total += segLength;
                methodStats[methodKey].completed += segCompleted;
            });
            
            const overallPercent = totalLength > 0 ? Math.round((completedLength / totalLength) * 100) : 0;
            
            let statsHTML = `
                <h3>📊 ${currentPipeline.name}</h3>
                <div class="stats-info" style="font-size: 13px; font-weight: bold; color: #2c3e50; margin: 10px 0;">
                    總進度：${overallPercent}% (${Math.round(completedLength)}m/${Math.round(totalLength)}m)
                </div>
            `;
            
            // 儲存工法列表供里程碑使用（含管徑管種）
            currentPipelineMethods = Object.keys(methodStats)
                .filter(m => m !== '未設定')
                .map(m => methodStats[m].label);
            
            // 顯示各工法統計
            Object.keys(methodStats).forEach(method => {
                const stats = methodStats[method];
                const percent = stats.total > 0 ? Math.round((stats.completed / stats.total) * 100) : 0;
                const color = METHOD_COLORS[method] ? METHOD_COLORS[method].color : '#999999';
                
                statsHTML += `
                    <div class="stats-info" style="font-size: 11px; margin: 5px 0; padding-left: 10px; border-left: 3px solid ${color};">
                        ${stats.label}：${percent}% (${Math.round(stats.completed)}m/${Math.round(stats.total)}m)
                    </div>
                `;
            });
            
            if (currentPipeline.notes) {
                statsHTML += `
                    <div class="stats-info" style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; font-size: 11px; color: #666;">
                        ${currentPipeline.notes}
                    </div>
                `;
            }
            
            const panel = document.createElement('div');
            panel.className = 'stats-panel';
            panel.innerHTML = statsHTML;
            document.body.appendChild(panel);
        }

        function addMeasurePoint(latlng) {
            measurePoints.push(latlng);
            
            // 加入標記
            const marker = L.circleMarker(latlng, {
                radius: 5,
                color: '#FF5722',
                fillColor: '#FF5722',
                fillOpacity: 1
            }).addTo(map);
            measureMarkers.push(marker);
            
            // 如果有兩個以上的點，畫線
            if (measurePoints.length > 1) {
                if (measureLine) {
                    map.removeLayer(measureLine);
                }
                
                measureLine = L.polyline(measurePoints, {
                    color: '#FF5722',
                    weight: 3,
                    opacity: 0.8,
                    dashArray: '5, 10'
                }).addTo(map);
                
                // 計算總距離
                let totalDistance = 0;
                for (let i = 0; i < measurePoints.length - 1; i++) {
                    totalDistance += map.distance(measurePoints[i], measurePoints[i + 1]);
                }
                
                // 顯示距離標籤
                if (measureLabel) {
                    map.removeLayer(measureLabel);
                }
                
                const lastPoint = measurePoints[measurePoints.length - 1];
                const distanceText = totalDistance >= 1000 
                    ? (totalDistance / 1000).toFixed(2) + ' km'
                    : totalDistance.toFixed(1) + ' m';
                
                measureLabel = L.popup({
                    closeButton: false,
                    autoClose: false,
                    closeOnClick: false
                })
                .setLatLng(lastPoint)
                .setContent('<div style="font-weight: bold; color: #FF5722;">📏 ' + distanceText + '</div>')
                .openOn(map);
            }
            
            // 右鍵結束測量
            map.once('contextmenu', function() {
                if (measureMode) {
                    toggleMeasureMode();
                }
            });
        }

        function parseLineString(lineString) {
            const match = lineString.match(/LINESTRING\s*\(([^)]+)\)/i);
            if (!match) return [];
            
            const coords = match[1];
            return coords.split(',').map(pair => {
                const [lng, lat] = pair.trim().split(/\s+/).map(Number);
                return [lat, lng];
            });
        }
        
        function getSegmentCoords(allCoords, startDist, endDist) {
            // 先計算所有座標點的累積距離
            const coordsWithDist = [{coord: allCoords[0], dist: 0}];
            let accumulatedDist = 0;
            
            for (let i = 0; i < allCoords.length - 1; i++) {
                const segDist = calculateDistance(
                    allCoords[i][0], allCoords[i][1],
                    allCoords[i+1][0], allCoords[i+1][1]
                );
                accumulatedDist += segDist;
                coordsWithDist.push({coord: allCoords[i+1], dist: accumulatedDist});
            }
            
            // 找出包含 startDist 和 endDist 的兩個座標點
            let startPoint = null;
            let endPoint = null;
            
            for (let i = 0; i < coordsWithDist.length - 1; i++) {
                const curr = coordsWithDist[i];
                const next = coordsWithDist[i + 1];
                
                // 檢查 startDist 是否在這兩點之間
                if (!startPoint && curr.dist <= startDist && next.dist >= startDist) {
                    // 在兩點之間插值
                    const ratio = (startDist - curr.dist) / (next.dist - curr.dist);
                    const lat = curr.coord[0] + (next.coord[0] - curr.coord[0]) * ratio;
                    const lng = curr.coord[1] + (next.coord[1] - curr.coord[1]) * ratio;
                    startPoint = [lat, lng];
                }
                
                // 檢查 endDist 是否在這兩點之間
                if (!endPoint && curr.dist <= endDist && next.dist >= endDist) {
                    // 在兩點之間插值
                    const ratio = (endDist - curr.dist) / (next.dist - curr.dist);
                    const lat = curr.coord[0] + (next.coord[0] - curr.coord[0]) * ratio;
                    const lng = curr.coord[1] + (next.coord[1] - curr.coord[1]) * ratio;
                    endPoint = [lat, lng];
                }
            }
            
            // 如果找不到，用最接近的點
            if (!startPoint) {
                const closest = coordsWithDist.reduce((prev, curr) => 
                    Math.abs(curr.dist - startDist) < Math.abs(prev.dist - startDist) ? curr : prev
                );
                startPoint = closest.coord;
            }
            
            if (!endPoint) {
                const closest = coordsWithDist.reduce((prev, curr) => 
                    Math.abs(curr.dist - endDist) < Math.abs(prev.dist - endDist) ? curr : prev
                );
                endPoint = closest.coord;
            }
            
            // 收集起點到終點之間的所有實際座標點
            const result = [startPoint];
            
            for (let i = 0; i < coordsWithDist.length; i++) {
                const {coord, dist} = coordsWithDist[i];
                if (dist > startDist && dist < endDist) {
                    result.push(coord);
                }
            }
            
            result.push(endPoint);
            
            return result;
        }
        
        function calculateTotalLength(coords) {
            let total = 0;
            for (let i = 0; i < coords.length - 1; i++) {
                total += calculateDistance(coords[i][0], coords[i][1], coords[i+1][0], coords[i+1][1]);
            }
            return total;
        }
        
        function calculateDistance(lat1, lng1, lat2, lng2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // ========== 施工日期標註功能（改良版）==========
        
        // 載入甘特圖項目用於日期標註
        async function loadGanttItemsForLabels() {
            if (!currentPipeline) return;
            
            try {
                const res = await fetch(API_URL + '?action=getGanttItems&pipelineId=' + encodeURIComponent(currentPipeline.id));
                const result = await res.json();
                ganttItemsCache = result.items || [];
                console.log('載入甘特圖項目用於日期標註:', ganttItemsCache.length, '個項目');
                
                // 監聽地圖縮放事件，自動調整標籤顯示
                map.on('zoomend', function() {
                    if (dateLabelsVisible) {
                        showDateLabels();
                    }
                });
            } catch (error) {
                console.error('載入甘特圖項目失敗:', error);
                ganttItemsCache = [];
            }
        }
        
        // 切換日期標註顯示/隱藏
        window.toggleDateLabels = function() {
            dateLabelsVisible = !dateLabelsVisible;
            const btn = document.getElementById('dateLabelButton');
            
            if (dateLabelsVisible) {
                btn.classList.add('active');
                showDateLabels();

                btn.classList.remove('active');

        // 顯示日期標註（改良版：浮水印 + 箭頭線 + 智能密度控制）
        function showDateLabels() {
            if (!currentPipeline || ganttItemsCache.length === 0) {
                console.log('無甘特圖項目可顯示');
                return;
            }
            
            clearDateLabels();
            
            // 取得當前縮放等級，決定顯示密度
            const zoom = map.getZoom();
            const showAllLabels = zoom >= 15; // 縮放等級 >= 15 時顯示所有標籤
            
            let visibleCount = 0;
            
            ganttItemsCache.forEach((item, index) => {
                // 智能密度控制：低縮放時只顯示部分標籤
                if (!showAllLabels && index % 2 === 1) return; // 縮放小時跳過一半標籤
                
                const label = item.label || '';
                const segMatch = label.match(/段落(\d+)/);
                const rangeMatch = label.match(/#(\d+)～#(\d+)/);
                
                if (!segMatch || !rangeMatch) return;
                
                const segmentNumber = parseInt(segMatch[1]);
                const fromSmall = parseInt(rangeMatch[1]) - 1;
                const toSmall = parseInt(rangeMatch[2]) - 1;
                
                const segment = currentPipeline.segments.find(s => s.segmentNumber === segmentNumber);
                if (!segment) return;
                
                const segmentLength = segment.endDistance - segment.startDistance;
                const numSmallSegments = Math.ceil(segmentLength / 10);
                
                const validFrom = Math.max(0, Math.min(fromSmall, numSmallSegments - 1));
                const validTo = Math.max(0, Math.min(toSmall, numSmallSegments - 1));
                
                // 計算起點和終點的實際距離
                const startDistance = segment.startDistance + (validFrom * 10);
                const endDistance = segment.startDistance + Math.min((validTo + 1) * 10, segmentLength);
                
                // 取得管線座標
                const coords = parseLineString(currentPipeline.linestring);
                const startCoord = getCoordAtDistance(coords, startDistance);
                const endCoord = getCoordAtDistance(coords, endDistance);
                
                if (!startCoord || !endCoord) return;
                
                // 計算標籤位置（在起點和終點的中間）
                const middleDistance = (startDistance + endDistance) / 2;
                const labelCoord = getCoordAtDistance(coords, middleDistance);
                
                // ========== 智能偏移：根據管線方向判斷 ==========
                // 計算管線方向（起點到終點的角度）
                const deltaLat = endCoord[0] - startCoord[0];
                const deltaLng = endCoord[1] - startCoord[1];
                const angle = Math.atan2(deltaLat, deltaLng) * (180 / Math.PI);
                
                // 判斷管線主要方向
                let offsetPixelsX = 0;
                let offsetPixelsY = -50; // 預設向上偏移
                
                // 東西向管線（-45° ~ 45° 或 135° ~ -135°）
                if ((angle >= -45 && angle <= 45) || (angle >= 135 || angle <= -135)) {
                    offsetPixelsX = 0;
                    offsetPixelsY = -80; // 東西向：標籤在上方，增加到80px
                }
                // 南北向管線（45° ~ 135° 或 -45° ~ -135°）
                else {
                    // 判斷要放左邊還是右邊（避免被其他管線遮擋）
                    if (angle >= 45 && angle <= 135) {
                        offsetPixelsX = -120; // 東北-西南走向：標籤在左側，增加到120px
                    } else {
                        offsetPixelsX = 120;  // 西北-東南走向：標籤在右側，增加到120px
                    }
                    offsetPixelsY = 0;
                }
                
                const point = map.latLngToContainerPoint(labelCoord);
                const offsetPoint = L.point(point.x + offsetPixelsX, point.y + offsetPixelsY);
                const offsetLatLng = map.containerPointToLatLng(offsetPoint);
                
                // 計算日期資訊
                const startDate = new Date(item.startDate);
                const endDate = new Date(item.endDate);
                const days = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24));
                
                // 計算管線長度
                const pipelineLength = Math.round(endDistance - startDistance);
                
                // 取得施工方式
                const method = segment.method || '未設定';
                
                const rangeStr = `#${validFrom + 1}~#${validTo + 1}`;
                const dateStr = `${formatDate(startDate)} ~ ${formatDate(endDate)}`;
                
                // 建立簡化單行標籤
                const labelHtml = `
                    <div class="schedule-label-watermark">
                        ${rangeStr} (${pipelineLength}m ${method}) ${dateStr} (${days}天)
                    </div>
                `;
                
                const marker = L.marker(offsetLatLng, {
                    icon: L.divIcon({
                        className: 'schedule-label-icon',
                        html: labelHtml,
                        iconSize: null,
                        iconAnchor: [50, 10]
                    }),
                    zIndexOffset: 1000
                });
                
                marker.addTo(map);
                dateLabels.push(marker);
                
                // ========== 繪製更明顯的箭頭線 ==========
                // 使用實線、較粗的線條、更飽和的顏色
                const arrowStart = L.polyline([offsetLatLng, startCoord], {
                    color: '#00796B',      // 更深的綠色
                    weight: 2.5,           // 更粗的線條
                    opacity: 0.8,          // 更高的不透明度
                    dashArray: '5, 5'      // 更長的虛線段
                }).addTo(map);
                
                const arrowEnd = L.polyline([offsetLatLng, endCoord], {
                    color: '#00796B',
                    weight: 2.5,
                    opacity: 0.8,
                    dashArray: '5, 5'
                }).addTo(map);
                
                // 在起點和終點加上更大、更明顯的圓點標記
                const startMarker = L.circleMarker(startCoord, {
                    radius: 5,             // 增大半徑
                    color: '#00796B',
                    fillColor: '#00BFA5',  // 使用更亮的填充色
                    fillOpacity: 0.9,
                    weight: 2
                }).addTo(map);
                
                const endMarker = L.circleMarker(endCoord, {
                    radius: 5,
                    color: '#00796B',
                    fillColor: '#00BFA5',
                    fillOpacity: 0.9,
                    weight: 2
                }).addTo(map);
                
                dateLabelArrows.push(arrowStart, arrowEnd, startMarker, endMarker);
                visibleCount++;
            });
            
            console.log(`顯示了 ${visibleCount} 個日期標註 (縮放等級: ${zoom})`);
        }
        
        // 清除日期標註
        function clearDateLabels() {
            dateLabels.forEach(marker => map.removeLayer(marker));
            dateLabels = [];
            dateLabelArrows.forEach(arrow => map.removeLayer(arrow));
            dateLabelArrows = [];
        }
        
        // 格式化日期（YYYY/MM/DD）
        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}/${m}/${d}`;
        }
        
        // 根據距離取得座標點
        function getCoordAtDistance(coords, targetDistance) {
            let accumulated = 0;
            
            for (let i = 0; i < coords.length - 1; i++) {
                const p1 = coords[i];
                const p2 = coords[i + 1];
                const segLength = getDistance(p1, p2);
                
                if (accumulated + segLength >= targetDistance) {
                    const ratio = (targetDistance - accumulated) / segLength;
                    return [
                        p1[0] + (p2[0] - p1[0]) * ratio,
                        p1[1] + (p2[1] - p1[1]) * ratio
                    ];
                }
                
                accumulated += segLength;
            }
            
            return coords[coords.length - 1];
        }
        
        // 計算兩點間距離（公尺）- Haversine 公式
        function getDistance(p1, p2) {
            const R = 6371000;
            const lat1 = p1[0] * Math.PI / 180;
            const lat2 = p2[0] * Math.PI / 180;
            const dLat = (p2[0] - p1[0]) * Math.PI / 180;
            const dLon = (p2[1] - p1[1]) * Math.PI / 180;
            
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                    Math.cos(lat1) * Math.cos(lat2) *
                    Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            
            return R * c;
        }
        
        // 供新視窗呼叫：刷新地圖上的日期標註
        window.refreshDateLabels = async function() {
            console.log('收到新視窗的更新通知，刷新日期標註...');
            await loadGanttItemsForLabels();
            if (dateLabelsVisible) {
                showDateLabels();
            }
        };
        
        // 監聽來自甘特圖新視窗的訊息
        window.addEventListener('message', async function(event) {
            console.log('主頁面收到訊息:', event.data);
            
            if (event.data && event.data.type === 'ganttChanged') {
                console.log('收到甘特圖變更通知，刷新日期標註...');
                await loadGanttItemsForLabels();
                if (dateLabelsVisible) {
                    showDateLabels();
                }
            }
        });
        
        console.log('管線施工進度管理系統 v2.0 - 簡化測試版');
        console.log('API URL:', API_URL);
        console.log('請打開 F12 Console 查看載入狀態');
    </script>
