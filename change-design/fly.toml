# Fly.io 部署設定（app 名稱請改成你自己的，全球唯一）
app = "pipe-change-design-api"
primary_region = "nrt"   # 東京，離台灣最近

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true     # 沒人用時自動休眠（省錢）
  auto_start_machines = true
  min_machines_running = 0

[env]
